# config/sidekiq.yml
:concurrency: 5
:queues:
  - default
  - fbr_invoices
  - mailers
  - webhooks

:schedule:
  sync_reference_data:
    cron: '0 2 * * *'  # Daily at 2 AM
    class: 'FbrSyncJob'
    
  update_dashboard_stats:
    cron: '*/15 * * * *'  # Every 15 minutes
    class: 'DashboardStatsJob'
    
  cleanup_old_logs:
    cron: '0 3 * * *'  # Daily at 3 AM
    class: 'CleanupLogsJob'

  subscription_reminders:
    cron: '0 9 * * *'  # Daily at 9 AM
    class: 'SubscriptionReminderJob'

  recurring_invoices:
    cron: '0 6 * * *'  # Daily at 6 AM
    class: 'RecurringInvoiceJob'